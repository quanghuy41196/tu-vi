<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lập Lá Số Tử Vi</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f0e8;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────── */
    .header {
      width: 100%;
      background: linear-gradient(135deg, #8b1a1a, #a02020);
      padding: 14px 0;
      text-align: center;
    }
    .header h1 { color: #ffd700; font-size: 1.4rem; letter-spacing: 2px; }

    /* ── Form ───────────────────────────────────────── */
    #form-section {
      display: flex;
      justify-content: center;
      padding: 30px 16px;
    }
    .form-wrap {
      background: #fff;
      border: 1px solid #d4c9a8;
      border-radius: 8px;
      padding: 28px 32px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    label.fl {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
      margin-top: 16px;
    }
    label.fl:first-child { margin-top: 0; }
    input[type="text"], input[type="number"], select {
      background: #fff;
      border: 1px solid #c5bda3;
      border-radius: 5px;
      color: #333;
      padding: 8px 10px;
      font-size: 0.9rem;
      outline: none;
    }
    input:focus, select:focus { border-color: #8b1a1a; }
    .fw { width: 100%; }
    .input-row { display: flex; gap: 8px; }
    .input-row select, .input-row input { flex: 1; min-width: 0; }
    .radio-group { display: flex; gap: 16px; margin-top: 6px; }
    .radio-group label {
      display: flex; align-items: center; gap: 5px;
      cursor: pointer; font-size: 0.9rem; color: #444;
    }
    .radio-group input[type="radio"] { accent-color: #8b1a1a; }
    .two-col { display: flex; gap: 16px; }
    .two-col > div { flex: 1; }
    .two-col label.fl { margin-top: 0; }
    .divider { border: none; border-top: 1px solid #e0d9c8; margin: 18px 0 4px; }
    .btn-submit {
      display: block; width: 200px; margin: 24px auto 0; padding: 10px 0;
      background: linear-gradient(135deg, #8b1a1a, #b02525);
      color: #fff; border: none; border-radius: 6px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer; letter-spacing: 1px;
    }
    .btn-submit:hover { opacity: 0.9; }

    /* ── Chart ──────────────────────────────────────── */
    #chart-section { display: none; padding: 16px; }

    .chart-toolbar {
      max-width: 1100px; margin: 0 auto 12px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .chart-toolbar button {
      background: #8b1a1a; color: #fff; border: none; border-radius: 5px;
      padding: 6px 16px; cursor: pointer; font-size: 0.85rem;
    }
    .chart-toolbar button:hover { opacity: 0.85; }

    .chart-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, auto);
      max-width: 1100px;
      margin: 0 auto;
      border: 2px solid #333;
    }

    /* Palace cell */
    .p-cell {
      border: 1px solid #999;
      padding: 6px 7px;
      font-size: 0.72rem;
      line-height: 1.5;
      min-height: 140px;
      background: #fff;
      display: flex;
      flex-direction: column;
    }
    .p-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 3px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 3px;
    }
    .p-pos { color: #555; font-size: 0.7rem; }
    .p-name { font-weight: 700; color: #000; font-size: 0.8rem; }
    .p-name.is-body { color: #8b1a1a; }
    .p-decadal { color: #666; font-size: 0.68rem; }

    .p-stars { margin-top: 2px; flex: 1; }
    .star-major { font-weight: 700; color: #000; display: block; font-size: 0.76rem; }
    .star-soft { color: #1a6b1a; display: block; }
    .star-tough { color: #cc0000; display: block; }
    .star-adj { color: #666; display: block; font-size: 0.68rem; }
    .star-bright { font-weight: 400; font-size: 0.62rem; color: #888; }
    .star-mutagen { color: #cc0000; font-weight: 700; font-size: 0.68rem; }

    .p-footer {
      display: flex;
      justify-content: space-between;
      font-size: 0.62rem;
      color: #888;
      border-top: 1px dotted #ccc;
      padding-top: 2px;
      margin-top: auto;
    }
    .p-footer span { white-space: nowrap; }

    .body-badge {
      display: inline-block;
      background: #8b1a1a;
      color: #fff;
      font-size: 0.58rem;
      padding: 0 4px;
      border-radius: 3px;
      margin-left: 3px;
      vertical-align: middle;
    }
    .origin-badge {
      display: inline-block;
      background: #2a6b2a;
      color: #fff;
      font-size: 0.58rem;
      padding: 0 4px;
      border-radius: 3px;
      margin-left: 3px;
      vertical-align: middle;
    }

    /* Center info panel */
    .center-cell {
      grid-column: 2 / 4;
      grid-row: 2 / 4;
      border: 1px solid #999;
      background: #fff;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      font-size: 0.8rem;
      line-height: 1.9;
    }
    .center-cell h2 {
      text-align: center;
      color: #8b1a1a;
      font-size: 1.1rem;
      margin-bottom: 10px;
      letter-spacing: 3px;
    }
    .center-cell .info-row {
      display: flex;
      gap: 8px;
    }
    .center-cell .info-label {
      color: #666;
      min-width: 80px;
      text-align: right;
      font-weight: 600;
    }
    .center-cell .info-label::after { content: ':'; }
    .center-cell .info-value { color: #222; font-weight: 500; }

    /* Legend */
    .chart-legend {
      max-width: 1100px;
      margin: 8px auto 0;
      display: flex;
      gap: 16px;
      font-size: 0.72rem;
      color: #555;
      flex-wrap: wrap;
    }
    .chart-legend span { display: flex; align-items: center; gap: 4px; }
    .legend-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 2px;
    }

    .error-msg {
      text-align: center;
      color: #cc0000;
      padding: 20px;
      font-size: 1rem;
    }

    @media (max-width: 800px) {
      .chart-grid { font-size: 0.65rem; }
      .p-cell { min-height: 110px; padding: 4px; }
      .center-cell { padding: 8px; font-size: 0.72rem; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>TỬ VI ĐẨU SỐ</h1>
</div>

<!-- ═══ FORM ═══ -->
<div id="form-section">
  <div class="form-wrap">
    <label class="fl">Họ Tên</label>
    <input type="text" id="hoTen" class="fw" placeholder="Nhập họ tên..." />

    <label class="fl">Ngày sinh</label>
    <div class="input-row">
      <select id="birthDay"></select>
      <select id="birthMonth"></select>
      <input type="number" id="birthYear" value="1911" min="1900" max="2100" />
    </div>
    <div class="radio-group" style="margin-top:10px">
      <label><input type="radio" name="calType" value="solar" checked> Lịch dương</label>
      <label><input type="radio" name="calType" value="lunar"> Lịch âm</label>
    </div>

    <label class="fl">Giờ sinh</label>
    <div class="input-row">
      <select id="timezone"></select>
      <select id="birthHour"></select>
      <select id="birthMinute"></select>
    </div>

    <label class="fl">Giới tính</label>
    <div class="radio-group">
      <label><input type="radio" name="gender" value="male" checked> Nam</label>
      <label><input type="radio" name="gender" value="female"> Nữ</label>
    </div>

    <hr class="divider" />
    <div class="two-col">
      <div>
        <label class="fl">Năm xem</label>
        <select id="horoYear" class="fw"></select>
      </div>
      <div>
        <label class="fl">Tháng xem (Âm lịch)</label>
        <select id="horoMonth" class="fw"></select>
      </div>
    </div>

    <button class="btn-submit" onclick="generateChart()">Lập lá số</button>
  </div>
</div>

<!-- ═══ CHART ═══ -->
<div id="chart-section">
  <div class="chart-toolbar">
    <button onclick="backToForm()">&#8592; Nhập lại</button>
    <span></span>
  </div>
  <div id="chart-container"></div>
  <div class="chart-legend" id="chart-legend">
    <span>Chữ đậm = Chính tinh</span>
    <span><span class="legend-dot" style="background:#1a6b1a"></span> Cát tinh</span>
    <span><span class="legend-dot" style="background:#cc0000"></span> Sát tinh / Hóa Kỵ</span>
    <span><span class="legend-dot" style="background:#666"></span> Tạp diệu</span>
    <span style="margin-left:auto;font-size:0.65rem;color:#aaa">M:Miếu V:Vượng Đ:Đắc B:Bình H:Hãm</span>
  </div>
</div>

<!-- Load iztro from CDN -->
<script src="https://cdn.jsdelivr.net/npm/iztro/dist/iztro.min.js"></script>

<script>
// ══════════════════════════════════════════════════════════════════════════
// Populate dropdowns
// ══════════════════════════════════════════════════════════════════════════
(function() {
  const add = (sel, val, text, selected) => {
    sel.add(new Option(text, val, selected, selected));
  };

  const daySel = document.getElementById('birthDay');
  for (let d = 1; d <= 31; d++) add(daySel, d, d, d === 1);

  const monthSel = document.getElementById('birthMonth');
  for (let m = 1; m <= 12; m++) add(monthSel, m, 'Tháng ' + m, m === 1);

  const tzSel = document.getElementById('timezone');
  for (let t = -12; t <= 12; t++) {
    add(tzSel, t, 'GMT ' + (t >= 0 ? '+' : '') + t, t === 7);
  }

  const hourSel = document.getElementById('birthHour');
  for (let h = 0; h <= 23; h++) add(hourSel, h, h + ' Giờ', h === 12);

  const minSel = document.getElementById('birthMinute');
  [0, 15, 30, 45].forEach(m => add(minSel, m, m + ' Phút', m === 30));

  const horoYearSel = document.getElementById('horoYear');
  const cur = new Date().getFullYear();
  for (let y = cur - 10; y <= cur + 10; y++) add(horoYearSel, y, y, y === cur);

  const horoMonthSel = document.getElementById('horoMonth');
  for (let m = 1; m <= 12; m++) add(horoMonthSel, m, 'Tháng ' + m, m === 1);
})();

// ══════════════════════════════════════════════════════════════════════════
// Helpers
// ══════════════════════════════════════════════════════════════════════════

// Map hour:minute → iztro timeIndex 0-12
function toTimeIndex(h, m) {
  const t = h * 60 + m;
  if (t < 60)   return 0;   // Tý sớm
  if (t < 180)  return 1;   // Sửu
  if (t < 300)  return 2;   // Dần
  if (t < 420)  return 3;   // Mão
  if (t < 540)  return 4;   // Thìn
  if (t < 660)  return 5;   // Tỵ
  if (t < 780)  return 6;   // Ngọ
  if (t < 900)  return 7;   // Mùi
  if (t < 1020) return 8;   // Thân
  if (t < 1140) return 9;   // Dậu
  if (t < 1260) return 10;  // Tuất
  if (t < 1380) return 11;  // Hợi
  return 12;                 // Tý muộn
}

// Escape HTML to prevent XSS
function esc(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

// ══════════════════════════════════════════════════════════════════════════
// Grid position: palace index → [row, col] in 4×4 grid
// palace 0=Dần, 1=Mão, 2=Thìn, 3=Tỵ, 4=Ngọ, 5=Mùi,
//        6=Thân, 7=Dậu, 8=Tuất, 9=Hợi, 10=Tý, 11=Sửu
// ══════════════════════════════════════════════════════════════════════════
const GRID = [
  [3,0],[2,0],[1,0],[0,0],  // Dần Mão Thìn Tỵ
  [0,1],[0,2],[0,3],        // Ngọ Mùi Thân
  [1,3],[2,3],[3,3],        // Dậu Tuất Hợi
  [3,2],[3,1]               // Tý Sửu
];

// ══════════════════════════════════════════════════════════════════════════
// Navigation
// ══════════════════════════════════════════════════════════════════════════
function backToForm() {
  document.getElementById('form-section').style.display = 'flex';
  document.getElementById('chart-section').style.display = 'none';
}

// ══════════════════════════════════════════════════════════════════════════
// Render a single star
// ══════════════════════════════════════════════════════════════════════════
function renderStar(s, cssClass) {
  let html = '<span class="' + cssClass + '">';
  html += esc(s.name);
  if (s.brightness) {
    html += ' <span class="star-bright">(' + esc(s.brightness) + ')</span>';
  }
  if (s.mutagen) {
    html += ' <span class="star-mutagen">[' + esc(s.mutagen) + ']</span>';
  }
  html += '</span>';
  return html;
}

// ══════════════════════════════════════════════════════════════════════════
// Build palace cell HTML
// ══════════════════════════════════════════════════════════════════════════
function buildPalaceCell(palace) {
  const decRange = palace.decadal && palace.decadal.range
    ? palace.decadal.range[0] + '–' + palace.decadal.range[1]
    : '';
  const decStem = palace.decadal
    ? (palace.decadal.heavenlyStem || '') + (palace.decadal.earthlyBranch || '')
    : '';

  let badges = '';
  if (palace.isBodyPalace) badges += '<span class="body-badge">Thân</span>';
  if (palace.isOriginalPalace) badges += '<span class="origin-badge">Lai</span>';

  // Stars
  const majors = (palace.majorStars || []).filter(s => s.type === 'major');
  const softs  = (palace.majorStars || []).filter(s => s.type !== 'major');
  const minors = palace.minorStars || [];
  const adjs   = palace.adjectiveStars || [];

  let starsHtml = '';
  majors.forEach(s => { starsHtml += renderStar(s, 'star-major'); });
  softs.forEach(s  => { starsHtml += renderStar(s, 'star-soft'); });
  minors.forEach(s => {
    const cls = (s.type === 'tough') ? 'star-tough' : 'star-soft';
    starsHtml += renderStar(s, cls);
  });
  adjs.forEach(s => { starsHtml += renderStar(s, 'star-adj'); });

  return `
    <div class="p-cell">
      <div class="p-header">
        <span class="p-pos">${esc(palace.heavenlyStem)}${esc(palace.earthlyBranch)}</span>
        <span class="p-name${palace.isBodyPalace ? ' is-body' : ''}">${esc(palace.name)}${badges}</span>
        <span class="p-decadal">${esc(decRange)}</span>
      </div>
      <div class="p-stars">${starsHtml}</div>
      <div class="p-footer">
        <span>ĐV.${esc(palace.changsheng12 || '')}</span>
        <span>${esc(palace.boshi12 || '')}</span>
        <span>LN.${esc(palace.suiqian12 || '')}</span>
      </div>
    </div>`;
}

// ══════════════════════════════════════════════════════════════════════════
// Build center info panel
// ══════════════════════════════════════════════════════════════════════════
function buildCenterInfo(a, formData) {
  const row = (label, value) =>
    `<div class="info-row">
      <span class="info-label">${label}</span>
      <span class="info-value">${esc(value)}</span>
    </div>`;

  return `
    <div class="center-cell">
      <h2>Lá Số Tử Vi</h2>
      ${row('Họ tên', formData.hoTen || '(chưa nhập)')}
      ${row('Dương lịch', a.solarDate)}
      ${row('Âm lịch', a.lunarDate)}
      ${row('Can Chi', a.chineseDate)}
      ${row('Giờ sinh', a.time + ' (' + a.timeRange + ')')}
      ${row('Giới tính', a.gender === 'male' || a.gender === '男' ? 'Dương Nam' : 'Dương Nữ')}
      ${row('Ngũ hành cục', a.fiveElementsClass)}
      ${row('Chủ mệnh', a.soul)}
      ${row('Chủ thân', a.body)}
      ${row('Cung Mệnh', a.earthlyBranchOfSoulPalace)}
      ${row('Cung Thân', a.earthlyBranchOfBodyPalace)}
      ${row('Sinh tiêu', a.zodiac)}
      ${row('Cung hoàng đạo', a.sign)}
      ${row('Năm xem', formData.horoYear)}
    </div>`;
}

// ══════════════════════════════════════════════════════════════════════════
// Build entire 4×4 grid
// ══════════════════════════════════════════════════════════════════════════
function buildChart(a, formData) {
  // Place palaces in a 4×4 matrix
  const matrix = Array.from({length: 4}, () => Array(4).fill(null));

  a.palaces.forEach((palace, i) => {
    const [r, c] = GRID[i];
    matrix[r][c] = buildPalaceCell(palace);
  });

  let html = '<div class="chart-grid">';

  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      if (r === 1 && c === 1) {
        // Center spanning cell
        html += buildCenterInfo(a, formData);
      } else if ((r === 1 && c === 2) || (r === 2 && c === 1) || (r === 2 && c === 2)) {
        continue; // Covered by center cell span
      } else {
        html += matrix[r][c] || '<div class="p-cell"></div>';
      }
    }
  }

  html += '</div>';
  return html;
}

// ══════════════════════════════════════════════════════════════════════════
// Main: Generate chart
// ══════════════════════════════════════════════════════════════════════════
function generateChart() {
  const year  = document.getElementById('birthYear').value;
  const month = document.getElementById('birthMonth').value;
  const day   = document.getElementById('birthDay').value;
  const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  const hour   = parseInt(document.getElementById('birthHour').value);
  const minute = parseInt(document.getElementById('birthMinute').value);
  const timeIndex = toTimeIndex(hour, minute);
  const gender  = document.querySelector('input[name="gender"]:checked').value;
  const calType = document.querySelector('input[name="calType"]:checked').value;
  const hoTen   = document.getElementById('hoTen').value.trim();
  const horoYear = document.getElementById('horoYear').value;

  const formData = { hoTen, horoYear };

  try {
    if (typeof iztro === 'undefined') {
      throw new Error('Thư viện iztro chưa được tải. Vui lòng kiểm tra kết nối mạng.');
    }

    let astrolabe;
    if (calType === 'solar') {
      astrolabe = iztro.astro.bySolar(dateStr, timeIndex, gender, true, 'vi-VN');
    } else {
      astrolabe = iztro.astro.byLunar(dateStr, timeIndex, gender, false, true, 'vi-VN');
    }

    // Render chart
    document.getElementById('chart-container').innerHTML = buildChart(astrolabe, formData);
    // copyright removed

    // Show chart, hide form
    document.getElementById('form-section').style.display = 'none';
    document.getElementById('chart-section').style.display = 'block';

  } catch (err) {
    document.getElementById('chart-container').innerHTML =
      '<div class="error-msg">Lỗi: ' + esc(err.message) + '</div>';
    document.getElementById('form-section').style.display = 'none';
    document.getElementById('chart-section').style.display = 'block';
    console.error(err);
  }
}
</script>

</body>
</html>
